<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ent-Viber</title>
</head>
<body>
    <h1>Ent-Viber</h1>
    <p id="output"></p>
    <script>
        function output(text) {document.getElementById("output").innerHTML += '<br><br><br><br>' + text;}

      
        const name = "Red";
        output(name);


        let points = 0;
        output(points);
        for (let i = 0; i < 3; i++) {
            points++;
            output(points);
        }


        output(typeof 42);
        output(typeof "Hallo");
        output(typeof false);
        
        const number = 42;
        if (number > 100) {
            output("Die Zahl ist größer als 100");
        } else {
            output("Die Zahl ist kleiner oder gleich 100");
        }

        const value = "red";
        switch(value) {
            case "red":
                output("Die Farbe ist rot");
                break;
            case "blue":
                output("Die Farbe ist blau");
                break;
            case "green":
                output("Die Farbe ist grün");
                break;
            default:
                output("Die Farbe ist unbekannt");
        }

        const somenum = 17;
        output(somenum % 2 === 0 ? "Gerade" : "Ungerade");


        for (let i = 1; i < 21; i++) {
            output(i);
        }


        let i = 5;
        while (i > -1) {
            output(i);
            i--;
        }

        function multiply(a, b) {
            return a * b;
        }
        output(multiply(3, 4));

        const multiplyArrow = (a, b) => a * b;
        output(multiplyArrow(5, 6));
    </script>
</body>
</html>
