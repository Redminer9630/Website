<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zeilen Filter</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      padding: 20px;
    }

    h1 {
      margin-top: 0;
    }

    textarea {
      width: 100%;
      min-height: 300px;
      background: #1e1e1e;
      color: white;
      border: 1px solid #444;
      padding: 10px;
      resize: vertical;
      box-sizing: border-box;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin: 15px 0;
    }

    .control {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    input,
    select,
    button {
      background: #1e1e1e;
      color: white;
      border: 1px solid #444;
      padding: 8px;
    }

    button {
      cursor: pointer;
    }

    button:hover {
      background: #2d2d2d;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .row button {
      flex: 1;
    }
  </style>
</head>

<body>
  <h1>Zeilen Filter</h1>

  <textarea id="input">
Adam, Fabian
Lehrkraft

Adnane, Imane
Lehrkraft

Ahmad, Sosin
Lehrkraft

Ahrenstedt, Meike
Lehrkraft

Akyol, Songül
Lehrkraft
  </textarea>

  <div class="controls">
    <div class="control">
      <label>Wiederhohlt alle # Zeilen</label>
      <input type="number" id="repeat" value="3" min="1">
    </div>

    <div class="control">
      <label>Offset</label>
      <input type="number" id="offset" value="0" min="0">
    </div>

    <div class="control">
      <label>Modus</label>
      <select id="mode">
        <option value="keep">Alles außer # löschen</option>
        <option value="delete"># Löschen</option>
      </select>
    </div>
  </div>

  <div class="row">
    <button onclick="processText()">Anwenden</button>
    <button onclick="copyResult()">Kopieren</button>
  </div>

  <h2>Ergebnis</h2>

  <textarea id="output"></textarea>

  <script>
    function processText() {
      const input = document.getElementById("input").value;
      const repeat = parseInt(document.getElementById("repeat").value);
      const offset = parseInt(document.getElementById("offset").value);
      const mode = document.getElementById("mode").value;

      const lines = input.split("\n");

      const result = lines.filter((line, index) => {
        const match = ((index - offset) % repeat === 0);

        if (index < offset) {
          return mode === "delete";
        }

        if (mode === "keep") {
          return match;
        } else {
          return !match;
        }
      });

      document.getElementById("output").value = result.join("\n");
    }

    function copyResult() {
      const output = document.getElementById("output");

      output.select();
      document.execCommand("copy");
    }

    processText();
  </script>
</body>
</html>
